<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | The Brew Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-uppercase" href="index.html">THE BREW</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainMenu">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item"><a class="nav-link text-white-50" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50" href="blog.html">Blog</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link text-white active" href="contact.html">Contact</a></li>
                </ul>
                <button class="btn btn-sm btn-outline-warning ms-lg-3" id="themeToggle">Toggle Dim Mode</button>
            </div>
        </div>
    </nav>
    <main class="container my-5" style="max-width: 600px;">
        <div class="card p-4 shadow-sm rounded-3">
            <h2 class="text-center text-gold mb-3 fw-bold">Connect With Us</h2>
            <p class="text-center text-muted small mb-4">Have questions about our blends or event hosting? Drop us a line below.</p>
            
            <form id="coffeeContactForm">
                <div class="mb-3">
                    <label class="form-label text-gold small fw-bold">Your Name</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="name" autocomplete="off">
                </div>
                <div class="mb-3">
                    <label class="form-label text-gold small fw-bold">Email Address</label>
                    <input type="email" class="form-control bg-dark text-white border-secondary" id="email">
                </div>
                <div class="mb-3">
                    <label class="form-label text-gold small fw-bold">Message</label>
                    <textarea class="form-control bg-dark text-white border-secondary" id="message" rows="4"></textarea>
                </div>
                <button type="submit" class="btn btn-coffee w-100 py-2 mt-2">Send Message</button>
                
                <!-- Targeted JS wrapper container -->
                <div id="formFeedback" class="mt-3"></div>
            </form>
        </div>
    </main>
    <footer class="py-4 text-center mt-5" style="border-top: 1px solid #1c1a17;">
        <p class="mb-0 text-muted small">&copy; 2026 The Brew Cafe. All rights reserved.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
