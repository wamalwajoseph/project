<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase tracking-wider" href="index.html">THE BREW</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link px-3 text-white-50" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link px-3 text-white-50" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link px-3 text-white-50" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link px-3 text-white-50" href="blog.html">Blog</a></li>
                    <li class="nav-item"><a class="nav-link px-3 text-white-50" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link px-3 text-white-50" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link px-3 text-white" href="contact.html">Contact</a></li>
                </ul>
                <button class="btn btn-sm btn-outline-warning ms-lg-3 px-3" id="themeToggle">Toggle Dim Mode</button>
            </div>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 600px;">
        <div class="card p-4 shadow">
            <h1 class="text-center text-gold mb-4 fw-bold">Connect With Us</h1>
            <p class="text-center text-white small mb-3">Submit your personal data below so our marketing systems can relentlessly pitch you holiday sales promos.</p>
            <form id="coffeeContactForm">
                <div class="mb-3">
                    <label class="form-label text-gold">Your Name</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="name">
                </div>
                <div class="mb-3">
                    <label class="form-label text-gold">Email Address</label>
                    <input type="email" class="form-control bg-dark text-white border-secondary" id="email">
                </div>
                <div class="mb-3">
                    <label class="form-label text-gold">Message</label>
                    <textarea class="form-control bg-dark text-white border-secondary" id="message" rows="4"></textarea>
                </div>
                <button type="submit" class="btn btn-coffee w-100 py-2">Send Message</button>
                <div id="formFeedback" class="mt-3"></div>
            </form>
        </div>
    </div>

    <footer class="py-4 text-center mt-5">
        <div class="container">
            <p class="mb-1 text-white">&copy; 2026 The Brew. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
